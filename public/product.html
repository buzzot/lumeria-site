<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{NAME}} — Lumeria</title>
  <meta name="description" content="{{DESCRIPTION}}" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Cormorant+Garamond:wght@300;400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/styles.css" />
  <link rel="icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='16' cy='16' r='6' fill='black'/></svg>" />
  <meta name="lumeria-slug" content="{{SLUG}}" />
</head>
<body class="page-product">
  <header class="site-header">
    <a href="/" class="brand">LUMERIA</a>
    <nav class="site-nav">
      <a href="/#catalog">Catalogue</a>
      <a href="/#studio">Studio</a>
      <a href="/#contact">Contact</a>
    </nav>
  </header>

  <a class="back-link" href="/#catalog">← Back to catalogue</a>

  <article class="product">
    <div class="product-image" id="product-image" aria-hidden="true">
      <!-- SVG inserted by /js/product.js -->
    </div>

    <div class="product-info">
      <p class="eyebrow">{{TYPE}}</p>
      <h1 class="product-name">{{NAME}}</h1>
      <p class="product-designer">by {{DESIGNER}}</p>

      <p class="product-description">{{DESCRIPTION}}</p>

      <dl class="product-specs" id="product-specs"></dl>

      <div class="product-actions">
        <p class="product-price" id="product-price"></p>
        <a class="cta" href="mailto:studio@lumeria.com?subject=Enquiry: {{NAME}}">Enquire</a>
      </div>
    </div>
  </article>

  <footer class="site-footer">
    <p class="copyright">© <span id="year"></span> Lumeria. All rights reserved.</p>
  </footer>

  <script src="/js/svg-shapes.js"></script>
  <script src="/js/product.js"></script>
  <script>document.getElementById("year").textContent = new Date().getFullYear();</script>
</body>
</html>
